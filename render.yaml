services:
  - type: web
    name: eld-trip-planner-backend
    env: python
    rootDir: eld-trip-planner-backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: eld-trip-planner-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-app.vercel.app
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ORS_API_KEY
        sync: false
